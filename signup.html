<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Inscription | SYSTENOV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a1f44;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #1e90ff, #00c6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .nav-links a:hover {
            color: #1e90ff;
        }
        .auth-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .auth-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        .auth-card h2 {
            margin-bottom: 1.5rem;
            color: #1e90ff;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #1e90ff;
            background: rgba(255,255,255,0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #1e90ff;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        button:hover {
            background: #28a745;
            transform: scale(1.02);
        }
        .error-msg {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .success-msg {
            color: #28a745;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .extra-links {
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        .extra-links a {
            color: #1e90ff;
            text-decoration: none;
        }
        footer {
            text-align: center;
            padding: 1rem;
            font-size: 0.75rem;
            color: #aaa;
        }
        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">SYSTENOV</div>
    <div class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="pricing.html">Tarifs</a>
        <a href="login.html">Connexion</a>
    </div>
</div>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2>📝 Créer un compte</h2>
        <form id="signupForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email professionnel" required autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mot de passe (min. 6 caractères)" required autocomplete="new-password">
            </div>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe" required autocomplete="off">
            </div>
            <button type="submit">S'inscrire</button>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
        </form>
        <div class="extra-links">
            <p>Déjà un compte ? <a href="login.html">Se connecter</a></p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 SYSTENOV — Solutions SaaS & IA</p>
</footer>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
    // Configuration Firebase (identique aux autres pages)
    const firebaseConfig = {
        apiKey: "AIzaSyDljdOGc96R7DRIFylZm65LADefjWCpeNA",
        authDomain: "systenov-platforme.firebaseapp.com",
        projectId: "systenov-platforme",
        storageBucket: "systenov-platforme.firebasestorage.app",
        messagingSenderId: "357439238725",
        appId: "1:357439238725:web:5a5b3868072035c086e92c"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const form = document.getElementById('signupForm');
    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.innerText = '';
        successDiv.innerText = '';

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;

        if (!email || !password || !confirm) {
            errorDiv.innerText = '❌ Tous les champs sont requis.';
            return;
        }
        if (password !== confirm) {
            errorDiv.innerText = '❌ Les mots de passe ne correspondent pas.';
            return;
        }
        if (password.length < 6) {
            errorDiv.innerText = '❌ Le mot de passe doit contenir au moins 6 caractères.';
            return;
        }

        try {
            const userCred = await auth.createUserWithEmailAndPassword(email, password);
            // Inscription réussie : redirection vers dashboard
            successDiv.innerText = '✅ Compte créé avec succès ! Redirection...';
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 1500);
        } catch (err) {
            console.error(err);
            if (err.code === 'auth/email-already-in-use') {
                errorDiv.innerText = '❌ Cet email est déjà utilisé. Veuillez vous connecter.';
            } else if (err.code === 'auth/invalid-email') {
                errorDiv.innerText = '❌ Email invalide.';
            } else if (err.code === 'auth/weak-password') {
                errorDiv.innerText = '❌ Mot de passe trop faible. Utilisez au moins 6 caractères.';
            } else {
                errorDiv.innerText = '❌ Erreur : ' + err.message;
            }
        }
    });
</script>
</body>
</html>
